# DDEV provider for a Drupal project.
#
# Pulls the database via `drush sql-dump` and the public files directory via
# rsync. Runs inside the web container and uses SSH, so the user must run
# `ddev auth ssh` once per DDEV session before `ddev pull <name>`.
#
# Placeholders (replace all `{{...}}` before committing):
#   {{SSH_USER}}         - SSH user on the remote server
#   {{SSH_HOST}}         - SSH hostname or IP
#   {{SSH_PORT}}         - SSH port (usually 22)
#   {{REMOTE_PATH}}      - Absolute path to the Drupal composer root on the server
#                          (the directory containing vendor/, web/, composer.json)
#   {{BACKUP_PATH}}      - Absolute path on the server for temporary dump files
#                          (must be writable by {{SSH_USER}})
#   {{FILES_SUBPATH}}    - Path from {{REMOTE_PATH}} to the public files dir.
#                          Default: web/sites/default/files

environment_variables:
  ssh_user: { { SSH_USER } }
  ssh_host: { { SSH_HOST } }
  ssh_port: { { SSH_PORT } }
  remote_path: { { REMOTE_PATH } }
  backup_path: { { BACKUP_PATH } }

auth_command:
  command: |
    set -eu -o pipefail
    ssh-add -l >/dev/null || ( echo "Please 'ddev auth ssh' before running this command." && exit 1 )

db_pull_command:
  command: |
    set -eu -o pipefail
    ssh -p${ssh_port} ${ssh_user}@${ssh_host} "cd ${remote_path} && ./vendor/bin/drush sql-dump | gzip > ${backup_path}/db.sql.gz"
    rsync -e "ssh -p\"${ssh_port}\"" "${ssh_user}"@"${ssh_host}":${backup_path}/db.sql.gz /var/www/html/.ddev/.downloads/
    ssh -p${ssh_port} ${ssh_user}@${ssh_host} "rm -f ${backup_path}/db.sql.gz"
  service: web

files_pull_command:
  command: |
    set -eu -o pipefail
    rsync -e "ssh -p\"${ssh_port}\"" -av "${ssh_user}"@"${ssh_host}":"${remote_path}"/{{FILES_SUBPATH}}/ /var/www/html/{{FILES_SUBPATH}}/
  service: web

# Pushing a database or files to a remote environment is dangerous and not
# enabled by default. Uncomment and adapt only for non-production targets.
db_push_command:
  command: |
    set -eu -o pipefail
    echo "Push is not supported for this environment."

files_push_command:
  command: |
    set -eu -o pipefail
    echo "Push is not supported for this environment."
