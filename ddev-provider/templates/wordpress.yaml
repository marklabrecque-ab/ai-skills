# DDEV provider for a WordPress project.
#
# Pulls the database via `wp db export` (WP-CLI) and the uploads directory via
# rsync. Runs inside the web container and uses SSH, so the user must run
# `ddev auth ssh` once per DDEV session before `ddev pull <name>`.
#
# Placeholders (replace all `{{...}}` before committing):
#   {{SSH_USER}}         - SSH user on the remote server
#   {{SSH_HOST}}         - SSH hostname or IP
#   {{SSH_PORT}}         - SSH port (usually 22)
#   {{KEY_FILE}}         - Path to the private key on the host, e.g. ~/.ssh/id_rsa.
#                          Documentation only — the commands use ddev-ssh-agent,
#                          not this path directly. It records which key is
#                          expected for this environment.
#   {{REMOTE_PATH}}      - Absolute path to the WordPress project root on the
#                          server (the directory containing wp-config.php, or
#                          the parent of `web/` in a Bedrock-style layout)
#   {{WP_CWD}}           - Path (relative to {{REMOTE_PATH}}) where wp-cli runs.
#                          Use `web` for Bedrock, `.` for a standard WP layout.
#   {{UPLOADS_SUBPATH}}  - Path from {{REMOTE_PATH}} to wp-content/uploads.
#                          Default: web/wp-content/uploads (Bedrock) or
#                          wp-content/uploads (standard WP).
#   {{BACKUP_PATH}}      - Absolute path on the server for temporary dump files
#                          (must be writable by {{SSH_USER}})

environment_variables:
  ssh_user: {{SSH_USER}}
  ssh_host: {{SSH_HOST}}
  ssh_port: {{SSH_PORT}}
  key_file: {{KEY_FILE}}
  remote_path: {{REMOTE_PATH}}
  wp_cwd: {{WP_CWD}}
  uploads_subpath: {{UPLOADS_SUBPATH}}
  backup_path: {{BACKUP_PATH}}

auth_command:
  command: |
    set -eu -o pipefail
    ssh-add -l >/dev/null || ( echo "Please 'ddev auth ssh' before running this command." && exit 1 )

db_pull_command:
  command: |
    set -eu -o pipefail
    ssh -p${ssh_port} ${ssh_user}@${ssh_host} "mkdir -p ${backup_path}"
    ssh -p${ssh_port} ${ssh_user}@${ssh_host} "cd ${remote_path}/${wp_cwd} && wp db export - | gzip > ${backup_path}/db.sql.gz"
    rsync -rvz -e "ssh -p\"${ssh_port}\"" "${ssh_user}"@"${ssh_host}":${backup_path}/db.sql.gz /var/www/html/.ddev/.downloads/
    ssh -p${ssh_port} ${ssh_user}@${ssh_host} "rm -f ${backup_path}/db.sql.gz"
  service: web

files_pull_command:
  command: |
    set -eu -o pipefail
    rsync -rvz -e "ssh -p${ssh_port}" --progress ${ssh_user}@${ssh_host}:${remote_path}/${uploads_subpath}/ /var/www/html/${uploads_subpath}/
  service: web

# Pushing a database or files to a remote environment is dangerous and not
# enabled by default. Uncomment and adapt only for non-production targets.
db_push_command:
  command: |
    set -eu -o pipefail
    echo "Push is not supported for this environment."

files_push_command:
  command: |
    set -eu -o pipefail
    echo "Push is not supported for this environment."
